name: Weekly Edition

on:
  schedule:
    - cron: "0 18 * * 2" # Tuesdays 18:00 UTC
  workflow_dispatch:
    inputs:
      week:
        description: "Edition week override (e.g., 2026-W17). Defaults to current ISO week."
        required: false

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Preflight — check required secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          missing=()
          [ -z "$ANTHROPIC_API_KEY" ] && missing+=("ANTHROPIC_API_KEY")
          [ -z "$BUTTONDOWN_API_KEY" ] && missing+=("BUTTONDOWN_API_KEY")
          [ -z "$VERCEL_TOKEN" ]       && missing+=("VERCEL_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::error::Configure them at Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.SEMANTIC_SCHOLAR_KEY }}" ]; then
            echo "::warning::SEMANTIC_SCHOLAR_KEY not set — Semantic Scholar calls may be rate-limited (HTTP 429)"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}
          SIGNAL_WEB_URL: "https://signal.hugohmacedo.com"
          WEEK_OVERRIDE: ${{ github.event.inputs.week }}
        run: |
          set -euo pipefail
          ARGS=(--run --json-logs)
          if [ -n "${WEEK_OVERRIDE:-}" ]; then
            if [[ ! "$WEEK_OVERRIDE" =~ ^[0-9]{4}-W[0-9]{2}(\.[0-9]+)?$ ]]; then
              echo "::error::Invalid WEEK_OVERRIDE format: $WEEK_OVERRIDE (expected YYYY-Www)"
              exit 1
            fi
            ARGS+=(--week "$WEEK_OVERRIDE")
          fi
          python -m scipaper "${ARGS[@]}"

      - name: Commit pipeline output
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/ data/anchors/
          if git diff --cached --quiet; then
            echo "No pipeline output changes to commit."
          else
            git commit -m "chore(pipeline): weekly edition state update [skip ci]"
            git pull --rebase origin main || true
            git push
          fi

      - name: Upload web archive
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-archive
          path: public/

      - name: Deploy to Vercel
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --token "$VERCEL_TOKEN" --yes

      - name: Notify on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "::error::Weekly pipeline failed. Check $RUN_URL"
